<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" role="img" aria-label="Process address space, my call stack">
  <defs>
    <style><![CDATA[
      text { fill: #f5f5f7; }
      .title    { font-size: 36px; font-weight: 600; letter-spacing: -1px; }
      .subtitle { font-size: 13px; fill: #a1a1a6; font-weight: 400; letter-spacing: 0.1px; }
      .addr     { font-size: 10px; fill: #86868b; font-family: ui-monospace, 'SF Mono', Menlo, monospace; letter-spacing: 0.5px; }
      .seg-h    { font-size: 11px; font-weight: 500; letter-spacing: 0.4px; }
      .frame    { font-size: 12px; fill: #f5f5f7; font-family: ui-monospace, 'SF Mono', Menlo, monospace; letter-spacing: -0.2px; }
      .data-k   { font-size: 10px; fill: #a1a1a6; font-family: ui-monospace, 'SF Mono', Menlo, monospace; }
      .data-v   { font-size: 10px; fill: #86868b; font-weight: 400; }
      .meta     { font-size: 9px; fill: #86868b; letter-spacing: 1.6px; text-transform: uppercase; font-weight: 500; }
      .footer   { font-size: 12px; fill: #86868b; letter-spacing: 0.4px; font-weight: 400; }
    ]]></style>
  </defs>

  <rect width="880" height="540" fill="#000000"/>

  <text x="440" y="60" text-anchor="middle" class="title">Address Space</text>
  <text x="440" y="84" text-anchor="middle" class="subtitle">a snapshot of what I'm running</text>

  <text x="268" y="125" text-anchor="end" class="addr">0xFFFFFFFFFFFF</text>
  <text x="268" y="499" text-anchor="end" class="addr">0x000000400000</text>

  <rect x="280" y="118" width="320" height="380" fill="none" stroke="#3a3a3c" stroke-width="0.8" rx="6"/>

  <rect x="280" y="118" width="320" height="32" fill="#0e0e10"/>
  <text x="440" y="139" text-anchor="middle" class="seg-h">kernel space</text>
  <line x1="280" y1="150" x2="600" y2="150" stroke="#3a3a3c" stroke-width="0.5"/>

  <text x="296" y="170" class="meta">stack ↓</text>

  <rect x="280" y="180" width="320" height="0" fill="#f5f5f7" fill-opacity="0.10">
    <animate attributeName="height"
             values="0;88;88;0;0"
             keyTimes="0;0.40;0.58;0.95;1"
             dur="10s"
             calcMode="spline"
             keySplines="0.45 0 0.55 1; 0 0 1 1; 0.45 0 0.55 1; 0 0 1 1"
             repeatCount="indefinite"/>
  </rect>

  <text x="310" y="198" class="frame" opacity="0">main()
    <animate attributeName="opacity"
             values="0;0;1;1;0;0"
             keyTimes="0;0.05;0.10;0.86;0.92;1"
             dur="10s" repeatCount="indefinite"/>
  </text>
  <text x="310" y="220" class="frame" opacity="0">uofc_3rd_year()
    <animate attributeName="opacity"
             values="0;0;1;1;0;0"
             keyTimes="0;0.15;0.20;0.76;0.82;1"
             dur="10s" repeatCount="indefinite"/>
  </text>
  <text x="310" y="242" class="frame" opacity="0">intern_at_amd()
    <animate attributeName="opacity"
             values="0;0;1;1;0;0"
             keyTimes="0;0.25;0.30;0.66;0.72;1"
             dur="10s" repeatCount="indefinite"/>
  </text>
  <text x="310" y="264" class="frame" opacity="0">build_gpu_swe()
    <animate attributeName="opacity"
             values="0;0;1;1;0;0"
             keyTimes="0;0.35;0.40;0.56;0.62;1"
             dur="10s" repeatCount="indefinite"/>
  </text>

  <text x="440" y="312" text-anchor="middle" class="meta">free</text>

  <text x="296" y="358" class="meta">heap ↑</text>

  <rect x="280" y="402" width="320" height="0" fill="#f5f5f7" fill-opacity="0.10">
    <animate attributeName="y"
             values="402;402;360;360;402;402"
             keyTimes="0;0.22;0.42;0.66;0.84;1"
             dur="10s"
             calcMode="spline"
             keySplines="1 0 1 1; 0.45 0 0.55 1; 0 0 1 1; 0.45 0 0.55 1; 0 0 1 1"
             repeatCount="indefinite"/>
    <animate attributeName="height"
             values="0;0;42;42;0;0"
             keyTimes="0;0.22;0.42;0.66;0.84;1"
             dur="10s"
             calcMode="spline"
             keySplines="1 0 1 1; 0.45 0 0.55 1; 0 0 1 1; 0.45 0 0.55 1; 0 0 1 1"
             repeatCount="indefinite"/>
  </rect>

  <text x="310" y="378" class="frame" opacity="0">learning(hpc)
    <animate attributeName="opacity"
             values="0;0;1;1;0;0"
             keyTimes="0;0.28;0.34;0.78;0.84;1"
             dur="10s" repeatCount="indefinite"/>
  </text>
  <text x="310" y="396" class="frame" opacity="0">reading(systems)
    <animate attributeName="opacity"
             values="0;0;1;1;0;0"
             keyTimes="0;0.38;0.44;0.66;0.72;1"
             dur="10s" repeatCount="indefinite"/>
  </text>

  <line x1="280" y1="412" x2="600" y2="412" stroke="#3a3a3c" stroke-width="0.5"/>

  <text x="310" y="430" class="data-k">.bss</text>
  <text x="572" y="430" text-anchor="end" class="data-v">wishlist</text>
  <line x1="296" y1="438" x2="584" y2="438" stroke="#3a3a3c" stroke-width="0.25"/>

  <text x="310" y="454" class="data-k">.data</text>
  <text x="572" y="454" text-anchor="end" class="data-v">values</text>
  <line x1="296" y1="462" x2="584" y2="462" stroke="#3a3a3c" stroke-width="0.25"/>

  <text x="310" y="478" class="data-k">.rodata</text>
  <text x="572" y="478" text-anchor="end" class="data-v">beliefs</text>
  <line x1="296" y1="486" x2="584" y2="486" stroke="#3a3a3c" stroke-width="0.25"/>

  <text x="310" y="497" class="data-k">.text</text>
  <text x="572" y="497" text-anchor="end" class="data-v">daily code</text>

  <text x="440" y="525" text-anchor="middle" class="footer">push  ·  pop  ·  malloc  ·  free</text>
</svg>
