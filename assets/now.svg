<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="ui-monospace, 'SF Mono', Menlo, Monaco, Consolas, monospace" role="img" aria-label="What I am working on">
  <defs>
    <style><![CDATA[
      text { font-size: 14px; fill: #f5f5f7; }
      .prompt   { fill: #6e6e73; }
      .cmd      { fill: #f5f5f7; font-weight: 500; }
      .quote    { fill: #d1d1d6; }
      .out      { fill: #f5f5f7; }
      .comment  { fill: #6e6e73; }
      .titlebar { font-size: 12px; fill: #a1a1a6; font-weight: 500; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
    ]]></style>
  </defs>

  <rect width="880" height="380" fill="#000000"/>

  <rect x="40" y="20" width="800" height="340" rx="10" fill="#000000" stroke="#3a3a3c" stroke-width="0.8"/>

  <circle cx="62"  cy="38" r="6" fill="#ff5f57"/>
  <circle cx="82"  cy="38" r="6" fill="#febc2e"/>
  <circle cx="102" cy="38" r="6" fill="#28c840"/>

  <text x="440" y="42" text-anchor="middle" class="titlebar">abuudiii — zsh</text>

  <line x1="40" y1="56" x2="840" y2="56" stroke="#3a3a3c" stroke-width="0.6"/>

  <g xml:space="preserve">
    <text x="80" y="92"><tspan class="prompt">abuudiii@gpu:~$ </tspan><tspan class="cmd">cat ~/.about</tspan></text>
    <text x="80" y="116" class="quote">i live close to the metal — chasing how compute actually</text>
    <text x="80" y="136" class="quote">happens, from a thread in a warp all the way down to a transistor.</text>

    <text x="80" y="176"><tspan class="prompt">abuudiii@gpu:~$ </tspan><tspan class="cmd">ls -la ~/now/</tspan></text>
    <text x="80" y="200"><tspan class="out">drwxr-xr-x   hip-runtime/        </tspan><tspan class="comment">  # learning the AMD GPU stack</tspan></text>
    <text x="80" y="220"><tspan class="out">drwxr-xr-x   rocm-internals/     </tspan><tspan class="comment">  # reading the source</tspan></text>
    <text x="80" y="240"><tspan class="out">drwxr-xr-x   compiler-explorer/  </tspan><tspan class="comment">  # disassembling everything</tspan></text>
    <text x="80" y="260"><tspan class="out">drwxr-xr-x   systems-reading/    </tspan><tspan class="comment">  # CSAPP, Patterson, OS internals</tspan></text>
    <text x="80" y="280" class="out">-rw-r--r--   side-projects.md</text>

    <text x="80" y="316"><tspan class="prompt">abuudiii@gpu:~$ </tspan><tspan class="cmd">uptime</tspan></text>
    <text x="80" y="340" class="out">3rd year · always shipping · never thermal throttling</text>
  </g>
</svg>
