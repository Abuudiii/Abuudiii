<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" role="img" aria-label="Abuudiii compute die">
  <defs>
    <style><![CDATA[
      @keyframes breathe { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
      @keyframes drift   { 0% { transform: translateX(0); } 100% { transform: translateX(490px); } }
      .pulse  { animation: breathe 4s ease-in-out infinite; }
      .drift  { animation: drift 6s linear infinite; }

      text { fill: #f5f5f7; }
      .title    { font-size: 38px; font-weight: 600; letter-spacing: -1.2px; }
      .subtitle { font-size: 14px; fill: #a1a1a6; font-weight: 400; }
      .label    { font-size: 12px; font-weight: 500; letter-spacing: 0.1px; }
      .meta     { font-size: 9.5px; fill: #86868b; font-weight: 500; letter-spacing: 1.4px; text-transform: uppercase; }
      .footer   { font-size: 13px; fill: #f5f5f7; font-weight: 400; }
      .footer-2 { font-size: 11px; fill: #86868b; font-weight: 400; }
      .hbm-l    { font-size: 9px; fill: #86868b; font-weight: 600; letter-spacing: 2px; }
    ]]></style>
  </defs>

  <rect width="880" height="460" fill="#000000"/>

  <text x="440" y="60"  text-anchor="middle" class="title">Abuudiii</text>
